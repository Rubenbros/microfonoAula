version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: aulas-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    command: >
      sh -c "
      mkdir -p /mosquitto/config &&
      echo 'listener 1883' > /mosquitto/config/mosquitto.conf &&
      echo 'listener 9001' >> /mosquitto/config/mosquitto.conf &&
      echo 'protocol websockets' >> /mosquitto/config/mosquitto.conf &&
      echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
      echo 'persistence true' >> /mosquitto/config/mosquitto.conf &&
      echo 'persistence_location /mosquitto/data/' >> /mosquitto/config/mosquitto.conf &&
      echo 'log_dest file /mosquitto/log/mosquitto.log' >> /mosquitto/config/mosquitto.conf &&
      /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aulas-backend
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - MQTT_BROKER=mqtt://mosquitto
      - MQTT_PORT=1883
      - HTTP_PORT=3001
      - WS_PORT=3002
    depends_on:
      - mosquitto
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data
