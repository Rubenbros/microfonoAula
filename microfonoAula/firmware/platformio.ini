; PlatformIO - Monitor de Ruido en Aulas
; Hardware: M5Stack ATOM Echo S3R (ESP32-S3)

[env:atom-echo-s3r]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Configuracion de compilacion
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1

; Velocidad del monitor serie
monitor_speed = 115200

; Librerias
lib_deps =
    m5stack/M5Unified@^0.2.2
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.1

; Particiones con mas espacio para la app
board_build.partitions = default.csv


; Puerto de upload (ajustar segun sistema)
; upload_port = COM3
; monitor_port = COM3
